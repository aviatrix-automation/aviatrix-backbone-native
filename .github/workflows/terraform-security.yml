name: Terraform Security Scanning

on:
  pull_request:
    paths:
      - '**.tf'
      - '.github/workflows/terraform-security.yml'
      - '.checkov.yaml'
      - '.trivyignore'
  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '.github/workflows/terraform-security.yml'
      - '.checkov.yaml'
      - '.trivyignore'
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Mondays

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  tfsec:
    name: tfsec Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tfsec
        env:
          TFSEC_VERSION: "1.28.14"
          TFSEC_CHECKSUM: "a32d0799bbefababaa4fcd814da9f4d251cd932789590b99d1d5fcb89ace6f68"
        run: |
          wget -q "https://github.com/aquasecurity/tfsec/releases/download/v${TFSEC_VERSION}/tfsec-linux-amd64"
          echo "${TFSEC_CHECKSUM}  tfsec-linux-amd64" | sha256sum --check
          chmod +x tfsec-linux-amd64
          sudo mv tfsec-linux-amd64 /usr/local/bin/tfsec
          tfsec --version

      - name: Run tfsec
        # SARIF upload omitted: tfsec generates git:// URIs which are incompatible
        # with github/codeql-action/upload-sarif (expects file:// URIs).
        # Third-party Aviatrix controller module findings excluded via --exclude.
        run: |
          tfsec modules/ --soft-fail \
            --exclude aws-ec2-no-public-egress-sgr,aws-ec2-enforce-http-token-imds,aws-ec2-require-vpc-flow-logs-for-all-vpcs,aws-ec2-add-description-to-security-group-rule,aws-ec2-volume-encryption-customer-key

  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        # Uses .checkov.yaml for directory scope and all skip-check suppressions.
        # output_format changed from "cli,sarif" (unsupported in bundled checkov 2.3.22)
        # to "sarif" only.
        uses: bridgecrewio/checkov-action@v12.2138.0
        with:
          config_file: .checkov.yaml
          soft_fail: true
          output_format: sarif
          output_file_path: results.sarif

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        # apt install uses the signed Aqua Security repo — GPG verification is
        # handled by apt itself, no separate checksum step needed.
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      - name: Run Trivy
        run: |
          trivy fs --scanners misconfig \
            --ignorefile .trivyignore \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0 \
            modules/

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [tfsec, checkov, trivy]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `## Security Scan Results 🔒

            ✅ tfsec scan completed
            ✅ Checkov scan completed
            ✅ Trivy scan completed

            View detailed results in the Security tab above.

            *Action: \`${{ github.event_name }}\`, Pusher: @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
