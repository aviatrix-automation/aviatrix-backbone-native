name: Terraform Security Scanning

on:
  pull_request:
    paths:
      - '**.tf'
      - '.github/workflows/terraform-security.yml'
      - '.checkov.yaml'
      - '.trivyignore'
  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '.github/workflows/terraform-security.yml'
      - '.checkov.yaml'
      - '.trivyignore'
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Mondays

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  tfsec:
    name: tfsec Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tfsec
        run: |
          wget -q https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64
          chmod +x tfsec-linux-amd64
          sudo mv tfsec-linux-amd64 /usr/local/bin/tfsec
          tfsec --version

      - name: Run tfsec
        # tfsec is deprecated in favor of trivy; SARIF output skipped due to a
        # known tfsec incompatibility (generates git:// URIs, GitHub expects file://).
        # Third-party module findings excluded via --exclude (see .checkov.yaml rationale).
        run: |
          tfsec modules/ --soft-fail \
            --exclude aws-ec2-no-public-egress-sgr,aws-ec2-enforce-http-token-imds,aws-ec2-require-vpc-flow-logs-for-all-vpcs,aws-ec2-add-description-to-security-group-rule,aws-ec2-volume-encryption-customer-key

  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          config_file: .checkov.yaml
          soft_fail: true
          output_format: sarif
          output_file_path: results.sarif

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: modules/
          scanners: misconfig
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [tfsec, checkov, trivy]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `## Security Scan Results 🔒

            ✅ tfsec scan completed
            ✅ Checkov scan completed
            ✅ Trivy scan completed

            View detailed results in the Security tab above.

            *Action: \`${{ github.event_name }}\`, Pusher: @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
